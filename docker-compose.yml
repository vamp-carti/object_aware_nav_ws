version: '3.8'

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: object_aware_nav_dev
    image: object_aware_nav:dev
    network_mode: host
    ipc: host
    pid: host
    group_add:
      - "44"
      - "992"
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - XAUTHORITY=/tmp/.Xauthority
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ~/.Xauthority:/tmp/.Xauthority:rw
      - .:/workspace/object_aware_nav_ws
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
